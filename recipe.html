{% extends "recipes/base.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Generated Recipe</title>
    <style>
        .recipe-container {
            max-width: 750px;
            margin: 25px auto;
            padding: 0 15px;
        }

        .recipe-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.10);
        }

        .recipe-title {
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .user-ingredients {
            background: #f5f5f5;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .user-ingredients strong {
            color: #333;
        }

        /* AI Recipe Output */
        .ai-recipe {
            background: #fafafa;
            border-left: 4px solid #28a745;
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            color: #333;

            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .ai-recipe h2 {
            font-size: 20px;
        }

        .button-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .back-btn {
            background: #28a745;
            color: white;
        }

        .print-btn {
            background: #333;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .recipe-container {
                margin: 15px auto;
            }

            .recipe-card {
                padding: 15px;
            }

            .recipe-title {
                font-size: 22px;
            }

            .ai-recipe {
                font-size: 13px;
                padding: 15px;
            }

            .button-area {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="recipe-container">
    <div class="recipe-card">
        <h1 class="recipe-title">🍲 AI Generated Recipe</h1>

        <!-- User Ingredients -->
        <div class="user-ingredients">
            <strong>🥕 Your Ingredients:</strong>
            {{ ingredients }}
        </div>

        <!-- AI Generated Recipe -->
        <div class="ai-recipe">
            {{ recipe }}
        </div>

        <!-- Buttons -->
        <div class="button-area">
            <a href="{% url 'home' %}" class="btn back-btn">🏠 Create Another Recipe</a>
            <button onclick="window.print()" class="btn print-btn">🖨 Print Recipe</button>
        </div>
    </div>
</div>

</body>
</html>
{% endblock %}
